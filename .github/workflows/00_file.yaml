name: First Workflow
on: 
  push:
  workflow_dispatch:
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: run script
        run: |
          chmod +x testing.sh
          ./testing.sh
  second-job:
    needs: first-job
    runs-on: ubuntu-latest
    steps:
      - name: output github context
        run: echo "${{ toJson(github) }}"
